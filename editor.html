<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Editor Totalmobi</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #top-bar {
      background: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .ql-toolbar.ql-snow {
      border: none !important;
      padding: 0 !important;
      flex: 1;
    }

    .ql-toolbar.ql-snow .ql-formats { margin-right: 6px; }

    /* Botão HTML na toolbar */
    .ql-html-btn {
      background: none;
      border: 1px solid #ccc !important;
      border-radius: 4px !important;
      padding: 2px 7px !important;
      font-size: 12px !important;
      font-weight: 700;
      color: #555;
      cursor: pointer;
      line-height: 1.4;
    }
    .ql-html-btn.active {
      background: #1565C0 !important;
      color: #fff !important;
      border-color: #1565C0 !important;
    }

    #save-btn {
      background: #1565C0;
      color: #ffffff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    #save-btn:active   { background: #0d47a1; }
    #save-btn:disabled { background: #90a4ae; cursor: default; }

    #editor-wrapper {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .ql-container.ql-snow {
      border: none !important;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .ql-editor {
      font-size: 16px;
      line-height: 1.7;
      padding: 16px;
      min-height: 100%;
      color: #212121;
    }

    .ql-editor.ql-blank::before { color: #9e9e9e; font-style: normal; }
    .ql-editor h1  { font-size: 1.6em; margin-bottom: 8px; }
    .ql-editor h2  { font-size: 1.3em; margin-bottom: 6px; }
    .ql-editor p   { margin-bottom: 8px; }
    .ql-editor img { max-width: 100%; height: auto; border-radius: 4px; cursor: pointer; }
    .ql-editor a   { color: #1565C0; }

    /* HTML source textarea */
    #html-source {
      display: none;
      flex: 1;
      width: 100%;
      padding: 16px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      line-height: 1.5;
      border: none;
      outline: none;
      resize: none;
      background: #1e1e1e;
      color: #d4d4d4;
      overflow-y: auto;
    }
    #html-source.visible { display: block; }

    /* Overlay de carregamento/upload */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: white;
      font-size: 15px;
    }
    #overlay.visible { display: flex; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      z-index: 300;
      white-space: nowrap;
      color: white;
    }
    #toast.success { background: #2e7d32; }
    #toast.error   { background: #c62828; }
    #toast.info    { background: #1565c0; }

    /* Modal de link de imagem */
    #img-link-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }
    #img-link-modal.visible { display: flex; }

    #img-link-box {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      width: 90%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    #img-link-box h3 {
      font-size: 15px;
      font-weight: 600;
      color: #212121;
    }
    #img-link-input {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      width: 100%;
    }
    #img-link-input:focus { border-color: #1565C0; }

    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .modal-btns button {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    #img-link-cancel { background: #e0e0e0; color: #333; }
    #img-link-remove { background: #c62828; color: #fff; }
    #img-link-ok     { background: #1565C0; color: #fff; }
  </style>
</head>
<body>

  <div id="top-bar">
    <div id="toolbar">
      <span class="ql-formats">
        <select class="ql-header">
          <option value="1">Título 1</option>
          <option value="2">Título 2</option>
          <option value="3">Título 3</option>
          <option selected>Normal</option>
        </select>
      </span>
      <span class="ql-formats">
        <button class="ql-bold"></button>
        <button class="ql-italic"></button>
        <button class="ql-underline"></button>
        <button class="ql-strike"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-list" value="ordered"></button>
        <button class="ql-list" value="bullet"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-align" value=""></button>
        <button class="ql-align" value="center"></button>
        <button class="ql-align" value="right"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-link"></button>
        <button class="ql-image"></button>
        <button class="ql-clean"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-html-btn" onclick="toggleHtml()" title="Ver/editar código HTML">&lt;/&gt;</button>
      </span>
    </div>
    <button id="save-btn" onclick="saveContent()">Guardar</button>
  </div>

  <div id="editor-wrapper">
    <div id="editor"></div>
    <textarea id="html-source" placeholder="Cole ou edite o HTML aqui..."></textarea>
  </div>

  <!-- Modal: Link de imagem -->
  <div id="img-link-modal">
    <div id="img-link-box">
      <h3>🔗 Link da imagem</h3>
      <input id="img-link-input" type="url" placeholder="https://exemplo.com/pagina">
      <div class="modal-btns">
        <button id="img-link-cancel" onclick="closeImgLink()">Cancelar</button>
        <button id="img-link-remove" onclick="removeImgLink()">Remover link</button>
        <button id="img-link-ok"     onclick="applyImgLink()">Aplicar</button>
      </div>
    </div>
  </div>

  <div id="overlay"><div class="spinner"></div><span id="overlay-msg">A carregar...</span></div>
  <div id="toast"></div>
  <input type="file" id="image-input" accept="image/*" style="display:none">

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script>

    // ── Parâmetros da URL ─────────────────────────────────────
    const params     = new URLSearchParams(window.location.search);
    const ARTICLE_ID = params.get('articleId') || '';
    const BUCKET     = params.get('bucket')    || '';
    const TOKEN      = params.get('token')     || '';
    const SUPABASE   = 'https://ulpsaxhocvezcohbndpz.supabase.co';
    const ANON_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVscHNheGhvY3ZlemNvaGJuZHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTIyMTAsImV4cCI6MjA4ODUyODIxMH0.e8kl7ZoHgVUM_KottkL2LJPr1OBQ29p4K8TrJoxapQU';

    // ── Utilitários ───────────────────────────────────────────
    function showOverlay(msg) {
      document.getElementById('overlay-msg').textContent = msg || 'A carregar...';
      document.getElementById('overlay').classList.add('visible');
    }
    function hideOverlay() {
      document.getElementById('overlay').classList.remove('visible');
    }
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = type || 'info';
      t.style.display = 'block';
      setTimeout(function() { t.style.display = 'none'; }, 3500);
    }

    // ── Inicializa Quill ──────────────────────────────────────
    var quill = new Quill('#editor', {
      theme: 'snow',
      modules: {
        toolbar: {
          container: '#toolbar',
          handlers: { image: imageHandler }
        }
      },
      placeholder: 'Escreva o conteúdo do artigo aqui...'
    });

    // ── Toggle HTML source ────────────────────────────────────
    var htmlMode = false;
    function toggleHtml() {
      var btn      = document.querySelector('.ql-html-btn');
      var source   = document.getElementById('html-source');
      var editorEl = document.getElementById('editor');

      if (!htmlMode) {
        // Entra em modo HTML — mostra o código
        var html = quill.root.innerHTML;
        if (html === '<p><br></p>') html = '';
        source.value = html;
        editorEl.style.display = 'none';
        source.classList.add('visible');
        btn.classList.add('active');
        htmlMode = true;
      } else {
        // Sai do modo HTML — primeiro restaura visibilidade, depois aplica
        var edited = source.value.trim();
        source.classList.remove('visible');
        editorEl.style.display = '';
        btn.classList.remove('active');
        htmlMode = false;
        // Só aplica depois do editor estar visível no DOM
        setTimeout(function() {
          quill.clipboard.dangerouslyPasteHTML(edited || '<p></p>');
          showToast('✓ HTML aplicado ao editor', 'success');
        }, 50);
      }
    }

    // ── Link em imagens — clique na imagem abre o modal ───────
    var currentImgEl = null;

    quill.root.addEventListener('click', function(e) {
      if (e.target && e.target.tagName === 'IMG') {
        currentImgEl = e.target;
        var existing = '';
        // Verifica se a imagem está envolvida num <a>
        if (currentImgEl.parentElement && currentImgEl.parentElement.tagName === 'A') {
          existing = currentImgEl.parentElement.getAttribute('href') || '';
        }
        document.getElementById('img-link-input').value = existing;
        document.getElementById('img-link-modal').classList.add('visible');
      }
    });

    function closeImgLink() {
      document.getElementById('img-link-modal').classList.remove('visible');
      currentImgEl = null;
    }

    function applyImgLink() {
      if (!currentImgEl) { closeImgLink(); return; }
      var url = document.getElementById('img-link-input').value.trim();
      if (!url) { removeImgLink(); return; }

      // Envolve a imagem num <a> ou actualiza o href existente
      var parent = currentImgEl.parentElement;
      if (parent && parent.tagName === 'A') {
        parent.setAttribute('href', url);
        parent.setAttribute('target', '_blank');
      } else {
        var a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        currentImgEl.parentNode.insertBefore(a, currentImgEl);
        a.appendChild(currentImgEl);
      }
      showToast('✓ Link adicionado à imagem', 'success');
      closeImgLink();
    }

    function removeImgLink() {
      if (!currentImgEl) { closeImgLink(); return; }
      var parent = currentImgEl.parentElement;
      if (parent && parent.tagName === 'A') {
        // Remove o <a> e deixa só a imagem
        parent.parentNode.insertBefore(currentImgEl, parent);
        parent.parentNode.removeChild(parent);
        showToast('Link removido da imagem', 'info');
      }
      closeImgLink();
    }

    // ── Carrega conteúdo do Supabase ──────────────────────────
    async function loadContent() {
      if (!ARTICLE_ID) { showToast('❌ Sem articleId', 'error'); return; }
      if (!TOKEN)      { showToast('❌ Sem token — verifique FlutterFlow', 'error'); return; }
      showOverlay('A carregar conteúdo...');
      try {
        var res = await fetch(
          SUPABASE + '/rest/v1/tot_articles?id=eq.' + ARTICLE_ID + '&select=content',
          { headers: {
              'Authorization': 'Bearer ' + TOKEN,
              'apikey': ANON_KEY
          }}
        );
        if (!res.ok) {
          var errText = await res.text();
          showToast('HTTP ' + res.status + ': ' + errText.slice(0,60), 'error');
          return;
        }
        var data = await res.json();
        if (data && data[0] && data[0].content) {
          quill.clipboard.dangerouslyPasteHTML(data[0].content);
          showToast('✓ Conteúdo carregado', 'success');
        } else {
          showToast('Artigo sem conteúdo (editor vazio)', 'info');
        }
      } catch(e) {
        showToast('Erro de rede: ' + e.message, 'error');
      } finally {
        hideOverlay();
      }
    }

    // ── Upload de imagem para Supabase Storage ────────────────
    function imageHandler() {
      var input = document.getElementById('image-input');
      input.value = '';
      input.onchange = async function() {
        var file = input.files[0];
        if (!file) return;
        if (!BUCKET || !TOKEN) {
          showToast('Configuração em falta para upload', 'error');
          return;
        }
        var ext      = file.name.split('.').pop().toLowerCase() || 'jpg';
        var filename = 'articles/' + Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
        showOverlay('A fazer upload da imagem...');
        try {
          var res = await fetch(
            SUPABASE + '/storage/v1/object/' + BUCKET + '/' + filename,
            { method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + TOKEN,
                'Content-Type': file.type,
                'x-upsert': 'false'
              },
              body: file
            }
          );
          if (!res.ok) { showToast('Erro no upload: ' + res.status, 'error'); return; }
          var publicUrl = SUPABASE + '/storage/v1/object/public/' + BUCKET + '/' + filename;
          var range = quill.getSelection(true);
          quill.insertEmbed(range.index, 'image', publicUrl);
          quill.setSelection(range.index + 1);
          showToast('✓ Imagem inserida', 'success');
        } catch(e) {
          showToast('Erro de rede no upload', 'error');
        } finally {
          hideOverlay();
        }
      };
      input.click();
    }

    // ── Guardar directamente no Supabase ─────────────────────
    async function saveContent() {
      if (!ARTICLE_ID || !TOKEN) {
        showToast('Sem articleId ou token — não é possível guardar', 'error');
        return;
      }

      // Se estiver em modo HTML, aplica primeiro o código editado
      if (htmlMode) { toggleHtml(); }

      var btn  = document.getElementById('save-btn');
      var html = quill.root.innerHTML;
      if (html === '<p><br></p>') html = '';

      btn.disabled = true;
      btn.textContent = 'A guardar...';
      showOverlay('A guardar...');

      try {
        var res = await fetch(
          SUPABASE + '/rest/v1/tot_articles?id=eq.' + ARTICLE_ID,
          { method: 'PATCH',
            headers: {
              'Authorization': 'Bearer ' + TOKEN,
              'apikey': ANON_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
              content:    html,
              updated_at: new Date().toISOString()
            })
          }
        );
        if (!res.ok) {
          var err = await res.text();
          showToast('Erro ao guardar: ' + res.status, 'error');
        } else {
          showToast('✓ Guardado com sucesso!', 'success');
        }
      } catch(e) {
        showToast('Erro de rede ao guardar', 'error');
      } finally {
        hideOverlay();
        btn.disabled = false;
        btn.textContent = 'Guardar';
      }
    }

    // ── Inicia carregamento ───────────────────────────────────
    loadContent();

  </script>
</body>
</html>
