<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Editor Totalmobi</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #top-bar {
      background: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .ql-toolbar.ql-snow {
      border: none !important;
      padding: 0 !important;
      flex: 1;
    }

    .ql-toolbar.ql-snow .ql-formats {
      margin-right: 6px;
    }

    #save-btn {
      background: #1565C0;
      color: #ffffff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    #save-btn:active { background: #0d47a1; }
    #save-btn:disabled { background: #90a4ae; cursor: default; }

    #editor-wrapper {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .ql-container.ql-snow {
      border: none !important;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .ql-editor {
      font-size: 16px;
      line-height: 1.7;
      padding: 16px;
      min-height: 100%;
      color: #212121;
    }

    .ql-editor.ql-blank::before {
      color: #9e9e9e;
      font-style: normal;
    }

    .ql-editor h1 { font-size: 1.6em; margin-bottom: 8px; }
    .ql-editor h2 { font-size: 1.3em; margin-bottom: 6px; }
    .ql-editor p  { margin-bottom: 8px; }
    .ql-editor img { max-width: 100%; height: auto; border-radius: 4px; }
    .ql-editor a  { color: #1565C0; }

    /* Upload overlay */
    #upload-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: white;
      font-size: 16px;
    }

    #upload-overlay.visible { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      display: none;
      z-index: 300;
      white-space: nowrap;
    }

    #toast.success { background: #388e3c; }
    #toast.error   { background: #c62828; }
  </style>
</head>
<body>

  <div id="top-bar">
    <div id="toolbar">
      <span class="ql-formats">
        <select class="ql-header">
          <option value="1">Título 1</option>
          <option value="2">Título 2</option>
          <option value="3">Título 3</option>
          <option selected>Normal</option>
        </select>
      </span>
      <span class="ql-formats">
        <button class="ql-bold"></button>
        <button class="ql-italic"></button>
        <button class="ql-underline"></button>
        <button class="ql-strike"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-list" value="ordered"></button>
        <button class="ql-list" value="bullet"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-align" value=""></button>
        <button class="ql-align" value="center"></button>
        <button class="ql-align" value="right"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-link"></button>
        <button class="ql-image"></button>
        <button class="ql-clean"></button>
      </span>
    </div>
    <button id="save-btn" onclick="saveContent()">Guardar</button>
  </div>

  <div id="editor-wrapper">
    <div id="editor"></div>
  </div>

  <!-- Upload overlay -->
  <div id="upload-overlay">
    <div class="spinner"></div>
    <span>A fazer upload da imagem...</span>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Input de ficheiro oculto para imagens -->
  <input type="file" id="image-input" accept="image/*" style="display:none">

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script>

    // ── Lê parâmetros da URL ──────────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const BUCKET  = params.get('bucket') || '';
    const TOKEN   = params.get('token')  || '';
    const SUPABASE_URL = 'https://ulpsaxhocvezcohbndpz.supabase.co';

    // ── Funções utilitárias ───────────────────────────────────
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = type || '';
      t.style.display = 'block';
      setTimeout(function() { t.style.display = 'none'; }, 3000);
    }

    function setUploadVisible(v) {
      var o = document.getElementById('upload-overlay');
      if (v) o.classList.add('visible');
      else   o.classList.remove('visible');
    }

    // ── Upload de imagem para Supabase Storage ────────────────
    async function uploadImage(file) {
      if (!BUCKET || !TOKEN) {
        showToast('Bucket ou token em falta — imagem não enviada', 'error');
        return null;
      }

      var ext      = file.name.split('.').pop().toLowerCase() || 'jpg';
      var filename = 'articles/' + Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
      var url      = SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + filename;

      setUploadVisible(true);
      try {
        var res = await fetch(url, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + TOKEN,
            'Content-Type': file.type,
            'x-upsert': 'false'
          },
          body: file
        });

        if (!res.ok) {
          var err = await res.text();
          console.error('Upload error:', err);
          showToast('Erro no upload: ' + res.status, 'error');
          return null;
        }

        // URL pública da imagem
        var publicUrl = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + filename;
        showToast('✓ Imagem enviada', 'success');
        return publicUrl;

      } catch (e) {
        console.error(e);
        showToast('Erro de rede no upload', 'error');
        return null;
      } finally {
        setUploadVisible(false);
      }
    }

    // ── Handler personalizado para imagem no Quill ────────────
    function imageHandler() {
      var input = document.getElementById('image-input');
      input.value = '';
      input.onchange = async function() {
        var file = input.files[0];
        if (!file) return;

        var publicUrl = await uploadImage(file);
        if (publicUrl) {
          var range = quill.getSelection(true);
          quill.insertEmbed(range.index, 'image', publicUrl);
          quill.setSelection(range.index + 1);
        }
      };
      input.click();
    }

    // ── Inicializa o editor Quill ─────────────────────────────
    var quill = new Quill('#editor', {
      theme: 'snow',
      modules: {
        toolbar: {
          container: '#toolbar',
          handlers: { image: imageHandler }
        }
      },
      placeholder: 'Escreva o conteúdo do artigo aqui...'
    });

    // ── Receber conteúdo HTML do Flutter ──────────────────────
    function setContent(html) {
      if (html && html.trim() !== '') {
        quill.clipboard.dangerouslyPasteHTML(html);
      }
    }

    // ── Guardar e enviar HTML de volta para o Flutter ─────────
    function saveContent() {
      var btn  = document.getElementById('save-btn');
      var html = quill.root.innerHTML;

      if (html === '<p><br></p>' || html.trim() === '') html = '';

      btn.disabled = true;
      btn.textContent = 'A guardar...';

      if (window.FlutterChannel) {
        window.FlutterChannel.postMessage(html);
      }

      setTimeout(function() {
        btn.disabled = false;
        btn.textContent = 'Guardar';
        showToast('✓ Guardado', 'success');
      }, 1000);
    }

    // Expõe funções para o Flutter
    window.setContent  = setContent;
    window.saveContent = saveContent;

  </script>
</body>
</html>
